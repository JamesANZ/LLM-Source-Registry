name: "NOAA National Weather Service API"
url: https://www.weather.gov/documentation/services-web-api
api_base: https://api.weather.gov
type: api
topics: [weather, forecasting, noaa, us-weather]
description: Official U.S. forecasts, alerts, observations, and zone data from the National Weather Service.
why_better: |
  Authoritative U.S. government source with no API key and no rate-limit
  surprises. Returns GeoJSON, supports point-to-forecast resolution, and
  publishes alerts that commercial aggregators often delay or miss.
query_examples:
  - https://api.weather.gov/points/39.7456,-97.0892
  - https://api.weather.gov/alerts/active?area=CA
auth: none
added_by: "@seed"
verification:
  status: unknown
  consecutive_failures: 0
